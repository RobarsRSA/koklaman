<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document Extractor + Telegram</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    input[type="file"] { margin-bottom: 10px; }
    button { margin-top: 10px; margin-right: 10px; }
    /* Make the output textarea visible */
    #output { width: 100%; height: 200px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Upload Document & Extract Phone & Passwords</h1>
  <input type="file" id="fileInput" />
  <br />
  <button id="startBtn">Start</button>
  <button id="copyBtn">Copy Output</button>
  <br />
  <textarea id="output" readonly></textarea>

  <!-- Mammoth for DOCX -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
  <script>
    document.getElementById('startBtn').addEventListener('click', async () => {
      const fileInput = document.getElementById('fileInput');
      const outputArea = document.getElementById('output');
      outputArea.value = ''; // Clear previous output

      if (!fileInput.files[0]) {
        alert('Please select a document.');
        return;
      }
      const file = fileInput.files[0];

      // Read file as ArrayBuffer or text depending on type
      const reader = new FileReader();
      reader.onload = async () => {
        const arrayBuffer = reader.result;
        // Convert ArrayBuffer to base64
        const uint8Array = new Uint8Array(arrayBuffer);
        const binaryString = Array.from(uint8Array).map(b => String.fromCharCode(b)).join('');
        const base64Data = btoa(binaryString);

        // Send to serverless function
        const response = await fetch('/.netlify/functions/sendToTelegram', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fileName: file.name,
            fileType: file.name.split('.').pop().toLowerCase(),
            fileData: base64Data
          })
        });
        const result = await response.json();

        // Display the extracted results
        outputArea.value = result.results || 'No phone/password pairs found.';
      };

      if (file.name.endsWith('.txt')) {
        reader.readAsText(file);
      } else if (file.name.endsWith('.docx')) {
        reader.readAsArrayBuffer(file);
      } else {
        alert('Unsupported file. Use .txt or .docx');
      }
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      const outputArea = document.getElementById('output');
      outputArea.select();
      document.execCommand('copy');
      alert('Output copied to clipboard!');
    });
  </script>
</body>
</html>
